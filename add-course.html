
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Omar's Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html" class="active">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Add a New Course</h2>
            <form action="#" method="get">
                <div class="form-group">
                    <label for="courseName">Course Name:</label>
                    <input type="text" id="courseName" name="courseName" required>
                </div>
                
                <div class="form-group">
                    <label for="instructor">Instructor:</label>
                    <input type="text" id="instructor" name="instructor" required>
                </div>
                
                <div class="form-group">
                    <label for="creditHours">Credit Hours:</label>
                    <input type="number" id="creditHours" name="creditHours" min="1" max="6" required>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <textarea id="notes" name="notes" rows="4" required></textarea>
                </div>
                
                <button type="submit" class="btn">Save Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Course Organizer Task. All rights reserved.</p>
    </footer>
</body>
</html>
